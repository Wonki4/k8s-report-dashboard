{{- if and .Values.backend.kubeconfig.enabled (not .Values.backend.kubeconfig.existingSecret) .Values.backend.kubeconfig.data }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-gpu-dashboard.backend.fullname" . }}-kubeconfig
  labels:
    {{- include "k8s-gpu-dashboard.backend.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.backend.kubeconfig.fileName }}: {{ .Values.backend.kubeconfig.data }}
{{- end }}
