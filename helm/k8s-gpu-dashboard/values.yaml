# -- Backend (FastAPI)
backend:
  replicaCount: 1

  image:
    repository: gpu-dashboard-backend
    tag: "latest"
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  rbac:
    create: true

  service:
    type: ClusterIP
    port: 8000

  env:
    DASHBOARD_HOST: "0.0.0.0"
    DASHBOARD_PORT: "8000"
    CORS_ORIGINS: "*"
    PYTHONUNBUFFERED: "1"
    CACHE_TTL: "30"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  probes:
    liveness:
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 15
    readiness:
      path: /healthz
      initialDelaySeconds: 5
      periodSeconds: 10

  kubeconfig:
    enabled: false
    existingSecret: ""
    data: ""
    mountPath: /etc/kubeconfig
    fileName: config

  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- Frontend (Nginx + React SPA)
frontend:
  replicaCount: 1

  image:
    repository: gpu-dashboard-frontend
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: gpu-dashboard.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  probes:
    liveness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 15
    readiness:
      path: /
      initialDelaySeconds: 3
      periodSeconds: 5

  nodeSelector: {}
  tolerations: []
  affinity: {}

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
