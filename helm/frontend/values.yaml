replicaCount: 1

image:
  repository: gpu-dashboard-frontend
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: gpu-dashboard.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

backend:
  # The backend service URL for nginx proxy
  # Format: <backend-release-name>-k8s-gpu-dashboard-backend:<port>
  # Example: gpu-backend-k8s-gpu-dashboard-backend:8000
  serviceUrl: "gpu-dashboard-backend:8000"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

probes:
  liveness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 15
  readiness:
    path: /
    initialDelaySeconds: 3
    periodSeconds: 5
